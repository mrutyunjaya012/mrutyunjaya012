name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:          # allows manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: mrutyunjaya012
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%232e7d32,%2343a047,%2366bb6a,%2381c784&color_dots=ebedf0,c6e6c6,8fce9a,4caf50,1b5e20
            dist/github-contribution-grid-snake-dark.svg?color_snake=%232e7d32,%2343a047,%2366bb6a,%2381c784&color_dots=161b22,0d3d0d,1b5e20,2e7d32,43a047

      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
