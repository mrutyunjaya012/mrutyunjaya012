name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:          # allows manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: mrutyunjaya012
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23bb9af7&color_dots=%23ebedf0,%23c3bef0,%23a48ce8,%237dcfff,%23bb9af7
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23bb9af7&color_dots=%23161b22,%232b2b4a,%233f3d7a,%23566ac9,%23bb9af7

      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
